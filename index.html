<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PLEXO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#080809;color:#EAEAF0;font-family:'DM Sans',sans-serif;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#C8FF00;border-radius:3px}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

/* ─ Storage ─ */
const LS={
  get:(k,fb)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
};

/* ─ Colors ─ */
const C={ac:"#C8FF00",warm:"#FF4D00",bd:"#1C1C22",sf:"#101014",sub:"#80808A",mt:"#38383F",bg:"#080809"};
const SC={Pending:"#C8FF00",Confirmed:"#00ff7f",Delivered:"#00bfff",Cancelled:"#ff4444"};
const SB={Pending:"#1a1a00",Confirmed:"#002a10",Delivered:"#001a2a",Cancelled:"#2a0000"};

/* ─ Defaults ─ */
const DEF_SETTINGS={
  brandName:"PLEXO",
  tagline:"UNIVERSAL SOLUTIONS",
  tickerText:"CASH ON DELIVERY ✦ NEW DROP EVERY FRIDAY ✦ GEN-Z STREETWEAR ✦ 7-DAY EASY RETURNS ✦",
  heroTitle:"DEFINE YOUR",
  heroTitleOutline:"UNIVERSE.",
  heroSub:"Oversized. Unapologetic. 100% Bangladeshi streetwear for the generation that rewrites the rules.",
  heroCTA:"SHOP NOW",
  accentColor:"#C8FF00",
  deliveryCharge:0,
  freeDeliveryArea:"Dhaka",
  codAvailable:true,
  waNumber:"",
  instagram:"",
  tiktok:"",
  facebook:"",
  footerText:"MADE WITH ❤️ IN DHAKA, BANGLADESH",
};
const DEF_CATS=["Oversized Tee","Graphic Tee","Hoodie","Fleece","Bottoms","Jogger","Athleisure","Co-ord Set","Accessories"];
const DEF_PRODUCTS=[
  {id:"d1",name:"Phantom Black Tee",category:"Oversized Tee",price:1299,originalPrice:1799,badge:"NEW",badgeType:"accent",image:"",description:"Premium 240gsm heavyweight cotton. Drop shoulder oversized fit."},
  {id:"d2",name:"Acid Wash Hoodie",category:"Hoodie",price:2499,originalPrice:3299,badge:"HOT",badgeType:"warm",image:"",description:"Garment-washed for a lived-in feel. Kangaroo pocket."},
  {id:"d3",name:"Techwear Cargo",category:"Bottoms",price:3199,originalPrice:3999,badge:"",badgeType:"",image:"",description:"Ripstop nylon shell. 6-pocket utility design."},
  {id:"d4",name:"Track Jacket",category:"Athleisure",price:2799,originalPrice:3599,badge:"NEW",badgeType:"accent",image:"",description:"Moisture-wicking polyester. Full-length front zip."},
];
const SIZES=["XS","S","M","L","XL","XXL","3XL"];
const DISTRICTS=["Dhaka","Chittagong","Sylhet","Rajshahi","Khulna","Barishal","Rangpur","Mymensingh","Other"];

/* ─ Helpers ─ */
const getCats=()=>LS.get("plexo_cats",DEF_CATS);
const getSettings=()=>({...DEF_SETTINGS,...LS.get("plexo_settings",{})});

/* ─ Grad map ─ */
const GRADS={"Oversized Tee":"135deg,#1a1a1a,#252515","Hoodie":"135deg,#151510,#222215","Bottoms":"135deg,#111118,#1a1a28","Athleisure":"135deg,#1a1212,#281a1a","Graphic Tee":"135deg,#0f1a0f,#1a2a1a","Fleece":"135deg,#181818,#252525","Co-ord Set":"135deg,#181818,#202020","Jogger":"135deg,#1a1818,#2a2020","Accessories":"135deg,#0d0d12,#10101e"};
const grad=c=>`linear-gradient(${GRADS[c]||"135deg,#111,#222"})`;

/* ═══════════════════════════════════════════════
   SMALL REUSABLE COMPONENTS
═══════════════════════════════════════════════ */
function Img({src,cat,style={},fs="4rem"}){
  const[fail,setFail]=useState(!src);
  useEffect(()=>setFail(!src),[src]);
  if(fail||!src)return<div style={{width:"100%",height:"100%",background:grad(cat),display:"flex",alignItems:"center",justifyContent:"center",...style}}><span style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:fs,color:"rgba(200,255,0,0.08)",userSelect:"none"}}>{(cat||"IMG").split(" ")[0].toUpperCase()}</span></div>;
  return<img src={src} alt={cat} onError={()=>setFail(true)} style={{width:"100%",height:"100%",objectFit:"cover",display:"block",...style}}/>;
}
function Toast({msg}){if(!msg)return null;return<div style={{position:"fixed",bottom:"2rem",left:"50%",transform:"translateX(-50%)",background:C.ac,color:"#080809",fontFamily:"'Space Mono',monospace",fontSize:".72rem",fontWeight:700,letterSpacing:".12em",padding:".75rem 2rem",borderRadius:"2px",zIndex:9999,whiteSpace:"nowrap",animation:"fadeIn .3s ease"}}>{msg}</div>;}
function StatusBadge({status}){return<span style={{fontFamily:"'Space Mono',monospace",fontSize:".52rem",fontWeight:700,padding:"3px 8px",borderRadius:"2px",background:SB[status]||SB.Pending,color:SC[status]||C.ac,letterSpacing:".08em"}}>{status||"Pending"}</span>;}
function SLabel({children,style={}}){return<p style={{fontFamily:"'Space Mono',monospace",fontSize:".6rem",letterSpacing:".2em",color:C.ac,textTransform:"uppercase",...style}}>{children}</p>;}
function Logo({settings}){
  const s=settings||getSettings();
  return<div style={{display:"flex",alignItems:"center",gap:10}}>
    <svg width="28" height="28" viewBox="0 0 100 100" fill="none"><rect x="10" y="10" width="28" height="50" rx="4" stroke={s.accentColor||C.ac} strokeWidth="9" fill="none"/><line x1="38" y1="10" x2="90" y2="70" stroke={s.accentColor||C.ac} strokeWidth="9" strokeLinecap="round"/><line x1="38" y1="70" x2="90" y2="10" stroke={s.accentColor||C.ac} strokeWidth="9" strokeLinecap="round"/><line x1="10" y1="70" x2="10" y2="90" stroke={s.accentColor||C.ac} strokeWidth="9" strokeLinecap="round"/><line x1="10" y1="90" x2="38" y2="90" stroke={s.accentColor||C.ac} strokeWidth="9" strokeLinecap="round"/></svg>
    <div style={{lineHeight:1}}><p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.3rem",letterSpacing:".1em",color:"#EAEAF0",margin:0}}>{s.brandName||"PLEXO"}</p><p style={{fontFamily:"'Space Mono',monospace",fontSize:".4rem",letterSpacing:".18em",color:C.sub,margin:0}}>{s.tagline||"UNIVERSAL SOLUTIONS"}</p></div>
  </div>;
}

/* ─ shared input style ─ */
const INP={width:"100%",background:"#080809",border:`1px solid #1C1C22`,color:"#EAEAF0",fontFamily:"'DM Sans',sans-serif",fontSize:".875rem",padding:".65rem .9rem",borderRadius:"2px",outline:"none",boxSizing:"border-box"};
const LBL={display:"block",fontFamily:"'Space Mono',monospace",fontSize:".58rem",letterSpacing:".15em",color:"#80808A",marginBottom:".45rem"};
const CARD={background:"#0D0D10",border:"1px solid #1C1C22",borderRadius:"4px",padding:"1.25rem",marginBottom:"1rem"};

/* ═══════════════════════════════════════════════
   SIZE CHART
═══════════════════════════════════════════════ */
const SIZE_CHART={
  tshirt:{label:"T-Shirt / Oversized Tee",cols:["SIZE","CHEST","LENGTH","SHOULDER","SLEEVE"],rows:[{s:"XS",v:["38","26","17","8"]},{s:"S",v:["40","27","18","8.5"]},{s:"M",v:["42","28","19","9"]},{s:"L",v:["44","29","20","9.5"]},{s:"XL",v:["46","30","21","10"]},{s:"XXL",v:["48","31","22","10.5"]},{s:"3XL",v:["50","32","23","11"]}],tip:"Oversized fit-এর জন্য actual chest-এর চেয়ে 2-4 ইঞ্চি বড় size নাও।"},
  hoodie:{label:"Hoodie / Sweatshirt",cols:["SIZE","CHEST","LENGTH","SHOULDER","SLEEVE"],rows:[{s:"XS",v:["40","26","18","24"]},{s:"S",v:["42","27","19","25"]},{s:"M",v:["44","28","20","26"]},{s:"L",v:["46","29","21","26.5"]},{s:"XL",v:["48","30","22","27"]},{s:"XXL",v:["50","31","23","27.5"]},{s:"3XL",v:["52","32","24","28"]}],tip:"Layering-এর জন্য এক size বড় নাও।"},
  bottoms:{label:"Pants / Jogger / Cargo",cols:["SIZE","WAIST","HIP","LENGTH","THIGH"],rows:[{s:"XS",v:["26-28","36","38","21"]},{s:"S",v:["28-30","38","39","22"]},{s:"M",v:["30-32","40","40","23"]},{s:"L",v:["32-34","42","41","24"]},{s:"XL",v:["34-36","44","42","25"]},{s:"XXL",v:["36-38","46","43","26"]},{s:"3XL",v:["38-40","48","44","27"]}],tip:"Elastic waist থাকে — actual waist size অনুযায়ী নাও।"},
};
const chartType=cat=>{const c=(cat||"").toLowerCase();if(c.includes("hoodie")||c.includes("fleece")||c.includes("jacket")||c.includes("co-ord"))return"hoodie";if(c.includes("bottom")||c.includes("jogger")||c.includes("cargo"))return"bottoms";return"tshirt";};

function SizeChartModal({category,onClose}){
  const ch=SIZE_CHART[chartType(category)];
  const[unit,setUnit]=useState("inches");
  const cvt=v=>{if(!v)return v;if(v.includes("-"))return v.split("-").map(x=>Math.round(Number(x)*2.54)).join("-");return(Number(v)*2.54).toFixed(1);};
  const d=v=>unit==="cm"?cvt(v):v;
  return<div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.92)",backdropFilter:"blur(12px)",zIndex:9500,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{background:"#0D0D10",border:"1px solid #1C1C22",borderRadius:"8px",width:"100%",maxWidth:560,maxHeight:"90vh",overflowY:"auto",animation:"slideUp .35s cubic-bezier(.22,1,.36,1)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1.1rem 1.5rem",borderBottom:"1px solid #1C1C22",position:"sticky",top:0,background:"#0D0D10"}}>
        <div><SLabel style={{marginBottom:".2rem"}}>📏 SIZE CHART</SLabel><p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.3rem",color:"#EAEAF0",letterSpacing:".05em"}}>{ch.label.toUpperCase()}</p></div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.sub,fontFamily:"'Space Mono',monospace",fontSize:".7rem",cursor:"pointer"}}>CLOSE ✕</button>
      </div>
      <div style={{padding:"1.25rem 1.5rem"}}>
        <div style={{display:"flex",alignItems:"center",gap:".5rem",marginBottom:"1rem"}}>
          <p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:C.sub,letterSpacing:".1em"}}>UNIT:</p>
          {["inches","cm"].map(u=><button key={u} onClick={()=>setUnit(u)} style={{fontFamily:"'Space Mono',monospace",fontSize:".6rem",fontWeight:700,padding:".3rem .75rem",borderRadius:"2px",border:`1px solid ${unit===u?C.ac:C.bd}`,background:unit===u?C.ac:"transparent",color:unit===u?"#080809":C.sub,cursor:"pointer"}}>{u.toUpperCase()}</button>)}
        </div>
        <div style={{overflowX:"auto",borderRadius:"3px",border:"1px solid #1C1C22"}}>
          <table style={{width:"100%",borderCollapse:"collapse"}}>
            <thead><tr style={{background:"rgba(200,255,0,.06)"}}>{ch.cols.map((col,i)=><th key={col} style={{fontFamily:"'Space Mono',monospace",fontSize:".55rem",letterSpacing:".1em",color:i===0?C.ac:C.sub,padding:".6rem .85rem",textAlign:i===0?"left":"center",borderBottom:"1px solid #C8FF00",whiteSpace:"nowrap"}}>{col}</th>)}</tr></thead>
            <tbody>{ch.rows.map((row,ri)=><tr key={row.s} style={{borderBottom:"1px solid #1C1C22",background:ri%2===0?"transparent":"rgba(255,255,255,.018)"}}>
              <td style={{padding:".6rem .85rem",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".7rem",color:C.ac}}>{row.s}</td>
              {row.v.map((val,vi)=><td key={vi} style={{padding:".6rem .85rem",textAlign:"center",color:"#EAEAF0",fontFamily:"'Space Mono',monospace",fontSize:".7rem"}}>{d(val)}<span style={{fontSize:".52rem",color:C.mt}}>{unit==="cm"?" cm":'"'}</span></td>)}
            </tr>)}</tbody>
          </table>
        </div>
        <div style={{marginTop:"1rem",padding:".85rem 1rem",background:"rgba(200,255,0,.05)",border:"1px solid rgba(200,255,0,.15)",borderRadius:"3px",display:"flex",gap:".6rem"}}>
          <span>💡</span><p style={{fontSize:".8rem",color:C.sub,lineHeight:1.6}}>{ch.tip}</p>
        </div>
        <div style={{marginTop:".75rem",display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:".5rem"}}>
          {[["REGULAR","নিজের size"],["LOOSE","1 size বড়"],["BAGGY","2 size বড়"]].map(([l,d])=><div key={l} style={{textAlign:"center",padding:".6rem",border:"1px solid #1C1C22",borderRadius:"2px"}}><p style={{fontFamily:"'Space Mono',monospace",fontSize:".52rem",color:C.ac,letterSpacing:".08em",marginBottom:".2rem"}}>{l}</p><p style={{fontSize:".72rem",color:C.sub}}>{d}</p></div>)}
        </div>
        <button onClick={onClose} style={{width:"100%",marginTop:"1rem",background:C.ac,color:"#080809",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".75rem",padding:".85rem",border:"none",cursor:"pointer",letterSpacing:".15em",borderRadius:"2px"}}>GOT IT ✓</button>
      </div>
    </div>
  </div>;
}

/* ═══════════════════════════════════════════════
   PRODUCT CARD
═══════════════════════════════════════════════ */
function ProductCard({product,settings,onOpen,onQuickAdd}){
  const[hov,setHov]=useState(false);
  const ac=settings?.accentColor||C.ac;
  return<div onClick={()=>onOpen(product)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{background:C.sf,border:`1px solid ${hov?`rgba(${hexToRgb(ac)},.35)`:C.bd}`,borderRadius:"3px",overflow:"hidden",cursor:"pointer",transform:hov?"translateY(-5px)":"translateY(0)",transition:"all .3s",position:"relative"}}>
    <div style={{aspectRatio:"3/4",position:"relative",overflow:"hidden"}}>
      <Img src={product.image} cat={product.category}/>
      {product.badge&&<span style={{position:"absolute",top:10,left:10,fontFamily:"'Space Mono',monospace",fontSize:".55rem",fontWeight:700,letterSpacing:".1em",padding:"3px 7px",borderRadius:"2px",background:product.badgeType==="warm"?C.warm:product.badgeType==="accent"?ac:C.bd,color:product.badgeType==="accent"?"#080809":"#fff"}}>{product.badge}</span>}
      <button onClick={e=>{e.stopPropagation();onQuickAdd(product);}} style={{position:"absolute",bottom:0,left:0,right:0,background:`rgba(${hexToRgb(ac)},.96)`,color:"#080809",fontFamily:"'Space Mono',monospace",fontSize:".68rem",fontWeight:700,letterSpacing:".1em",padding:".7rem",border:"none",cursor:"pointer",transform:hov?"translateY(0)":"translateY(100%)",transition:"transform .3s cubic-bezier(.22,1,.36,1)"}}>+ ADD TO CART</button>
    </div>
    <div style={{padding:".75rem"}}>
      <p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",letterSpacing:".1em",color:C.sub,marginBottom:".3rem"}}>{product.category.toUpperCase()}</p>
      <p style={{fontWeight:500,fontSize:".875rem",marginBottom:".5rem",color:"#EAEAF0"}}>{product.name}</p>
      <div style={{display:"flex",alignItems:"center",gap:".5rem"}}>
        <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".875rem",color:ac}}>৳{product.price.toLocaleString()}</span>
        {product.originalPrice>product.price&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:".7rem",color:C.mt,textDecoration:"line-through"}}>৳{product.originalPrice.toLocaleString()}</span>}
      </div>
    </div>
  </div>;
}
function hexToRgb(hex){try{const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`${r},${g},${b}`;}catch{return"200,255,0";}}

/* ═══════════════════════════════════════════════
   PRODUCT DETAIL MODAL
═══════════════════════════════════════════════ */
function ProductModal({product,settings,onClose,onAdd}){
  const[size,setSize]=useState("");const[qty,setQty]=useState(1);const[err,setErr]=useState(false);const[chart,setChart]=useState(false);
  useEffect(()=>{setSize("");setQty(1);setErr(false);setChart(false);},[product]);
  if(!product)return null;
  const ac=settings?.accentColor||C.ac;
  const disc=product.originalPrice>product.price;
  const pct=disc?Math.round((1-product.price/product.originalPrice)*100):0;
  return<>
    {chart&&<SizeChartModal category={product.category} onClose={()=>setChart(false)}/>}
    <div onClick={e=>{if(e.target===e.currentTarget&&!chart)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",backdropFilter:"blur(10px)",zIndex:8500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}>
      <div style={{background:C.sf,border:`1px solid ${C.bd}`,width:"100%",maxWidth:"760px",maxHeight:"92vh",overflowY:"auto",borderRadius:"8px 8px 0 0",animation:"slideUp .4s cubic-bezier(.22,1,.36,1)"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1.1rem 1.5rem",borderBottom:`1px solid ${C.bd}`,position:"sticky",top:0,background:C.sf,zIndex:10}}>
          <SLabel>PRODUCT DETAILS</SLabel>
          <button onClick={onClose} style={{background:"none",border:"none",color:C.sub,fontFamily:"'Space Mono',monospace",fontSize:".7rem",cursor:"pointer"}}>CLOSE ✕</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr"}}>
          <div style={{aspectRatio:"4/3",overflow:"hidden",background:grad(product.category)}}><Img src={product.image} cat={product.category} fs="8rem" style={{width:"100%",height:"100%",objectFit:"cover"}}/></div>
          <div style={{padding:"1.5rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
            <div>
              <SLabel style={{marginBottom:".4rem"}}>{product.category.toUpperCase()}</SLabel>
              <h2 style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.2rem",lineHeight:1.05,color:"#EAEAF0"}}>{product.name}</h2>
              {product.description&&<p style={{color:C.sub,fontSize:".875rem",lineHeight:1.7,marginTop:".6rem"}}>{product.description}</p>}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:".75rem"}}>
              <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:"1.4rem",color:ac}}>৳{product.price.toLocaleString()}</span>
              {disc&&<><span style={{fontFamily:"'Space Mono',monospace",fontSize:".875rem",color:C.mt,textDecoration:"line-through"}}>৳{product.originalPrice.toLocaleString()}</span><span style={{background:C.warm,color:"#fff",fontFamily:"'Space Mono',monospace",fontSize:".58rem",fontWeight:700,padding:"2px 6px",borderRadius:"2px"}}>SAVE {pct}%</span></>}
            </div>
            <div style={{height:"1px",background:C.bd}}/>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:".75rem"}}>
                <p style={{fontFamily:"'Space Mono',monospace",fontSize:".6rem",letterSpacing:".18em",color:err?C.warm:C.sub}}>{err?"⚠️ সাইজ বেছে নাও!":"SELECT SIZE"}{size&&<span style={{color:ac,marginLeft:".5rem"}}>— {size}</span>}</p>
                <button onClick={()=>setChart(true)} style={{display:"flex",alignItems:"center",gap:".35rem",background:"transparent",border:`1px solid ${C.bd}`,color:ac,fontFamily:"'Space Mono',monospace",fontSize:".55rem",letterSpacing:".1em",padding:".3rem .7rem",borderRadius:"2px",cursor:"pointer"}}>📏 SIZE CHART</button>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:".5rem"}}>
                {SIZES.map(sz=><button key={sz} onClick={()=>setSize(sz)} style={{fontFamily:"'Space Mono',monospace",fontSize:".65rem",fontWeight:700,letterSpacing:".08em",padding:".5rem .9rem",borderRadius:"2px",cursor:"pointer",border:`1px solid ${size===sz?ac:C.bd}`,background:size===sz?ac:"transparent",color:size===sz?"#080809":C.sub,transition:"all .18s"}}>{sz}</button>)}
              </div>
            </div>
            <div>
              <p style={{fontFamily:"'Space Mono',monospace",fontSize:".6rem",letterSpacing:".18em",color:C.sub,marginBottom:".75rem"}}>QUANTITY</p>
              <div style={{display:"flex",alignItems:"center",gap:".75rem"}}>
                {["-","+"].map((sym,i)=><button key={sym} onClick={()=>setQty(q=>Math.max(1,Math.min(10,q+(i===0?-1:1))))} style={{width:36,height:36,border:`1px solid ${C.bd}`,background:"transparent",color:"#EAEAF0",fontSize:"1.1rem",cursor:"pointer",borderRadius:"2px",transition:"border-color .2s"}}>{sym}</button>)}
                <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:"1.1rem",minWidth:"2rem",textAlign:"center"}}>{qty}</span>
              </div>
            </div>
            <div style={{height:"1px",background:C.bd}}/>
            <button onClick={()=>{if(!size){setErr(true);setTimeout(()=>setErr(false),2000);return;}onAdd(product,size,qty);onClose();}} style={{width:"100%",background:ac,color:"#080809",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".8rem",padding:"1rem",border:"none",cursor:"pointer",letterSpacing:".15em",borderRadius:"2px"}}>ADD TO CART → ({qty} × ৳{(product.price*qty).toLocaleString()})</button>
            <p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:C.mt,textAlign:"center"}}>সাইজ নিয়ে সন্দেহ? SIZE CHART দেখো।</p>
          </div>
        </div>
      </div>
    </div>
  </>;
}

/* ═══════════════════════════════════════════════
   CART + ORDERS DRAWER
═══════════════════════════════════════════════ */
function CartDrawer({cart,open,tab,onTab,onClose,onRemove,onClear,onCheckout,settings}){

  useEffect(()=>{if(open)setOrders(LS.get("plexo_orders",[]));},[ open,tab]);
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const qty=cart.reduce((s,i)=>s+i.qty,0);
  const ac=settings?.accentColor||C.ac;
  const pending=orders.filter(o=>o.status==="Pending").length;
  return<>
    {open&&<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.65)",backdropFilter:"blur(4px)",zIndex:7999}}/>}
    <div style={{position:"fixed",top:0,right:open?0:"-100%",bottom:0,width:"min(440px,100vw)",background:C.sf,borderLeft:`1px solid ${C.bd}`,zIndex:8000,transition:"right .4s cubic-bezier(.22,1,.36,1)",display:"flex",flexDirection:"column"}}>
      <div style={{flexShrink:0,borderBottom:`1px solid ${C.bd}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1rem 1.25rem"}}>
          <div style={{display:"flex",gap:0}}>
            <button onClick={()=>onTab("cart")} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:".68rem",fontWeight:700,letterSpacing:".1em",padding:".5rem 1rem",color:tab==="cart"?ac:C.sub,borderBottom:`2px solid ${tab==="cart"?ac:"transparent"}`,transition:"all .2s"}}>🛍 CART{qty>0&&<span style={{background:ac,color:"#080809",borderRadius:"50%",width:18,height:18,fontSize:".5rem",fontWeight:700,display:"inline-flex",alignItems:"center",justifyContent:"center",marginLeft:".35rem"}}>{qty}</span>}</button>
            <button onClick={()=>{setOrders(LS.get("plexo_orders",[]));onTab("orders");}} style={{background:"none",border:"none",cursor:"pointer",fontFamily:"'Space Mono',monospace",fontSize:".68rem",fontWeight:700,letterSpacing:".1em",padding:".5rem 1rem",color:tab==="orders"?ac:C.sub,borderBottom:`2px solid ${tab==="orders"?ac:"transparent"}`,transition:"all .2s"}}>📦 MY ORDERS{pending>0&&<span style={{background:SB.Pending,color:SC.Pending,borderRadius:"2px",padding:"1px 5px",fontSize:".5rem",marginLeft:".35rem"}}>{pending}</span>}</button>
          </div>
          <button onClick={onClose} style={{background:"none",border:"none",cursor:"pointer",color:C.sub,fontFamily:"'Space Mono',monospace",fontSize:".7rem"}}>CLOSE ✕</button>
        </div>
      </div>
      {tab==="cart"&&<>
        <div style={{flex:1,overflowY:"auto",padding:"1.25rem"}}>
          {cart.length===0?<div style={{textAlign:"center",paddingTop:"3rem"}}><p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"2.5rem",color:C.mt}}>EMPTY</p><p style={{color:C.sub,fontSize:".875rem",marginTop:".5rem"}}>Product add করো!</p></div>
          :cart.map(item=><div key={item.cid} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:".75rem",paddingBottom:".75rem",marginBottom:".75rem",borderBottom:`1px solid ${C.bd}`}}>
            <div style={{flex:1,minWidth:0}}><p style={{fontSize:".875rem",fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</p><p style={{fontFamily:"'Space Mono',monospace",fontSize:".65rem",color:C.sub,marginTop:".2rem"}}>৳{item.price.toLocaleString()} × {item.qty}</p></div>
            <div style={{display:"flex",alignItems:"center",gap:".75rem",flexShrink:0}}><span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".875rem",color:ac}}>৳{(item.price*item.qty).toLocaleString()}</span><button onClick={()=>onRemove(item.cid)} style={{background:"none",border:"none",color:C.mt,fontSize:"1.2rem",cursor:"pointer"}}>×</button></div>
          </div>)}
        </div>
        {cart.length>0&&<div style={{borderTop:`1px solid ${C.bd}`,padding:"1.25rem",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:".75rem"}}><span style={{fontFamily:"'Space Mono',monospace",fontSize:".75rem",color:C.sub}}>SUBTOTAL</span><span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:"1.1rem",color:ac}}>৳{total.toLocaleString()}</span></div>
          {settings?.deliveryCharge>0&&<p style={{fontFamily:"'Space Mono',monospace",fontSize:".6rem",color:C.sub,marginBottom:".5rem"}}>Delivery charge: ৳{settings.deliveryCharge}</p>}
          <button onClick={onCheckout} style={{width:"100%",background:ac,color:"#080809",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".8rem",padding:"1rem",border:"none",cursor:"pointer",letterSpacing:".15em",borderRadius:"2px"}}>PLACE ORDER →</button>
          <button onClick={onClear} style={{width:"100%",marginTop:".5rem",background:"none",border:"none",color:C.mt,fontFamily:"'Space Mono',monospace",fontSize:".6rem",padding:".5rem",cursor:"pointer"}}>CLEAR CART</button>
        </div>}
      </>}
      {tab==="orders"&&<div style={{flex:1,overflowY:"auto",padding:"1.25rem"}}>

        :<div style={{display:"flex",flexDirection:"column",gap:".75rem"}}>
          <button onClick={()=>setOrders(LS.get("plexo_orders",[]))} style={{background:"rgba(200,255,0,.06)",border:"1px solid rgba(200,255,0,.2)",color:ac,fontFamily:"'Space Mono',monospace",fontSize:".6rem",padding:".5rem",cursor:"pointer",borderRadius:"2px",letterSpacing:".1em"}}>🔄 REFRESH STATUS</button>
          {orders.map(o=><div key={o.id} style={{background:"#080809",border:`1px solid ${C.bd}`,borderRadius:"3px",padding:"1rem"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:".6rem"}}>
              <div><p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:C.sub,marginBottom:".2rem"}}>{o.timestamp}</p><p style={{fontFamily:"'Space Mono',monospace",fontSize:".65rem",color:ac,fontWeight:700}}>{o.id}</p></div>
              <StatusBadge status={o.status}/>
            </div>
            <div style={{borderTop:`1px solid ${C.bd}`,paddingTop:".6rem",marginBottom:".6rem"}}>
              {o.items.map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:".25rem"}}><span style={{fontSize:".8rem"}}>{it.name} × {it.qty}</span><span style={{fontFamily:"'Space Mono',monospace",fontSize:".75rem",color:ac}}>৳{(it.price*it.qty).toLocaleString()}</span></div>)}
            </div>
            <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${C.bd}`,paddingTop:".6rem"}}>
              <p style={{fontSize:".78rem",color:C.sub}}>{o.customer.name} · {o.customer.payment}</p>
              <span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,color:ac}}>৳{o.total.toLocaleString()}</span>
            </div>
            <div style={{marginTop:".75rem",display:"flex",gap:".3rem",alignItems:"center"}}>
              {["Pending","Confirmed","Delivered"].map((st,i)=>{
                const idx=["Pending","Confirmed","Delivered","Cancelled"].indexOf(o.status||"Pending");
                const done=o.status!=="Cancelled"&&i<=idx;
                const active=["Pending","Confirmed","Delivered","Cancelled"][idx]===st;
                return<React.Fragment key={st}>
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",flex:1}}>
                    <div style={{width:24,height:24,borderRadius:"50%",background:done?ac:"#1C1C22",border:`2px solid ${done?ac:C.bd}`,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:".25rem",transition:"all .3s"}}>{done&&<span style={{fontSize:".6rem",color:"#080809",fontWeight:700}}>✓</span>}</div>
                    <p style={{fontFamily:"'Space Mono',monospace",fontSize:".42rem",color:active?ac:C.sub,textAlign:"center",letterSpacing:".05em"}}>{st.toUpperCase()}</p>
                  </div>
                  {i<2&&<div style={{flex:1,height:2,background:done&&i<idx?ac:C.bd,marginBottom:"1.2rem",transition:"background .3s"}}/>}
                </React.Fragment>;
              })}
              {o.status==="Cancelled"&&<span style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:SC.Cancelled,marginLeft:"auto"}}>❌ CANCELLED</span>}
            </div>
          </div>)}
        </div>}
      </div>}
    </div>
  </>;
}

/* ═══════════════════════════════════════════════
   ORDER FORM DRAWER
═══════════════════════════════════════════════ */
function OrderDrawer({cart,open,onClose,onSuccess,settings}){
  const[form,setForm]=useState({name:"",phone:"",address:"",district:"",payment:"COD",note:""});
  const total=cart.reduce((s,i)=>s+i.price*i.qty,0);
  const delivery=settings?.deliveryCharge||0;
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const ac=settings?.accentColor||C.ac;
  const inp={...INP};const lbl={...LBL};
  const submit=()=>{
    if(!form.name.trim()||!form.phone.trim()||!form.address.trim()){alert("নাম, ফোন এবং ঠিকানা বাধ্যতামূলক!");return;}
    if(!cart.length){alert("Cart empty!");return;}
    const order={id:"ORD-"+Date.now(),timestamp:new Date().toLocaleString("en-BD",{hour12:true}),customer:{...form},items:cart.map(i=>({name:i.name,price:i.price,qty:i.qty})),total:total+delivery,status:"Pending"};
    LS.set("plexo_orders",[order,...LS.get("plexo_orders",[])]);
    setForm({name:"",phone:"",address:"",district:"",payment:"COD",note:""});
    onClose();onSuccess(order);
  };
  return<>
    {open&&<div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",backdropFilter:"blur(5px)",zIndex:8099}}/>}
    <div style={{position:"fixed",top:0,right:open?0:"-100%",bottom:0,width:"min(480px,100vw)",background:C.sf,borderLeft:`1px solid ${C.bd}`,zIndex:8100,transition:"right .4s cubic-bezier(.22,1,.36,1)",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1.1rem 1.25rem",borderBottom:`1px solid ${C.bd}`,position:"sticky",top:0,background:C.sf,zIndex:10}}>
        <div><p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#EAEAF0",letterSpacing:".05em"}}>PLACE ORDER</p><SLabel>FILL YOUR DETAILS</SLabel></div>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.sub,fontFamily:"'Space Mono',monospace",fontSize:".7rem",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"1rem 1.25rem",borderBottom:`1px solid ${C.bd}`,background:C.bg}}>
        <SLabel style={{marginBottom:".75rem"}}>YOUR ORDER</SLabel>
        {cart.map(i=><div key={i.cid} style={{display:"flex",justifyContent:"space-between",marginBottom:".4rem"}}><span style={{fontSize:".875rem"}}>{i.name} × {i.qty}</span><span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,color:ac,fontSize:".875rem"}}>৳{(i.price*i.qty).toLocaleString()}</span></div>)}
        {delivery>0&&<div style={{display:"flex",justifyContent:"space-between",marginTop:".4rem"}}><span style={{fontSize:".8rem",color:C.sub}}>Delivery charge</span><span style={{fontFamily:"'Space Mono',monospace",color:C.sub,fontSize:".8rem"}}>৳{delivery}</span></div>}
        <div style={{display:"flex",justifyContent:"space-between",paddingTop:".75rem",borderTop:`1px solid ${C.bd}`,marginTop:".5rem"}}><span style={{fontFamily:"'Space Mono',monospace",fontSize:".7rem",color:C.sub}}>TOTAL</span><span style={{fontFamily:"'Space Mono',monospace",fontWeight:700,color:ac}}>৳{(total+delivery).toLocaleString()}</span></div>
      </div>
      <div style={{padding:"1.25rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
        <SLabel>DELIVERY INFO</SLabel>
        <div><label style={lbl}>FULL NAME *</label><input style={inp} value={form.name} onChange={e=>upd("name",e.target.value)} placeholder="তোমার পুরো নাম"/></div>
        <div><label style={lbl}>PHONE NUMBER *</label><input style={inp} value={form.phone} onChange={e=>upd("phone",e.target.value)} placeholder="01XXXXXXXXX"/></div>
        <div><label style={lbl}>DELIVERY ADDRESS *</label><textarea style={{...inp,resize:"vertical"}} rows={3} value={form.address} onChange={e=>upd("address",e.target.value)} placeholder="বাড়ি/রাস্তা, এলাকা, শহর"/></div>
        <div><label style={lbl}>DISTRICT</label><select style={inp} value={form.district} onChange={e=>upd("district",e.target.value)}><option value="">জেলা বেছে নাও</option>{DISTRICTS.map(d=><option key={d}>{d}</option>)}</select></div>
        <div><label style={lbl}>PAYMENT METHOD</label>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".5rem"}}>
            {(settings?.codAvailable!==false?["COD"]:[]
            ).concat(["bKash / Nagad"]).map(m=><label key={m} style={{display:"flex",alignItems:"center",gap:".5rem",border:`1px solid ${form.payment===m?ac:C.bd}`,padding:".75rem",cursor:"pointer",borderRadius:"2px",fontSize:".875rem",transition:"border-color .2s"}}><input type="radio" name="pay" checked={form.payment===m} onChange={()=>upd("payment",m)} style={{accentColor:ac}}/>{m==="COD"?"Cash on Delivery":m}</label>)}
          </div>
        </div>
        <div><label style={lbl}>SPECIAL NOTE (optional)</label><textarea style={{...inp,resize:"vertical"}} rows={2} value={form.note} onChange={e=>upd("note",e.target.value)} placeholder="Size preference, color, etc."/></div>
        <button onClick={submit} style={{width:"100%",background:ac,color:"#080809",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".8rem",padding:"1rem",border:"none",cursor:"pointer",letterSpacing:".15em",borderRadius:"2px",marginTop:".5rem"}}>✅ CONFIRM ORDER</button>
        <p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:C.mt,textAlign:"center"}}>1-2 ঘন্টার মধ্যে call করে confirm করব।</p>
      </div>
    </div>
  </>;
}

/* ═══════════════════════════════════════════════
   PRODUCT FORM (used inside Admin)
═══════════════════════════════════════════════ */
function ProductForm({initial,onSave,onClose}){
  const[f,setF]=useState({id:initial?.id||"",name:initial?.name||"",category:initial?.category||"",price:initial?.price||"",originalPrice:initial?.originalPrice||"",badge:initial?.badge||"",badgeType:initial?.badgeType||"accent",image:initial?.image||"",description:initial?.description||""});
  const u=(k,v)=>setF(x=>({...x,[k]:v}));
  const[cats,setCats]=useState(()=>getCats());
  const[newCat,setNewCat]=useState("");const[showNew,setShowNew]=useState(false);
  const addCat=()=>{const t=newCat.trim();if(!t)return;if(cats.map(c=>c.toLowerCase()).includes(t.toLowerCase())){alert("Already exists!");return;}const up=[...cats,t];setCats(up);LS.set("plexo_cats",up);u("category",t);setNewCat("");setShowNew(false);};
  const delCat=cat=>{if(!window.confirm(`"${cat}" delete করবে?`))return;const up=cats.filter(c=>c!==cat);setCats(up);LS.set("plexo_cats",up);if(f.category===cat)u("category","");};
  const inp={...INP};const lbl={...LBL};
  return<div onClick={e=>{if(e.target===e.currentTarget)onClose();}} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.82)",backdropFilter:"blur(6px)",zIndex:9000,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{background:"#0D0D10",border:`1px solid ${C.bd}`,borderRadius:"4px",width:"100%",maxWidth:560,maxHeight:"92vh",overflowY:"auto"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"1rem 1.25rem",borderBottom:`1px solid ${C.bd}`,position:"sticky",top:0,background:"#0D0D10"}}>
        <p style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:"1.4rem",color:"#EAEAF0",letterSpacing:".05em"}}>{initial?"EDIT PRODUCT":"ADD PRODUCT"}</p>
        <button onClick={onClose} style={{background:"none",border:"none",color:C.sub,fontSize:"1.1rem",cursor:"pointer"}}>✕</button>
      </div>
      <div style={{padding:"1.25rem",display:"flex",flexDirection:"column",gap:"1rem"}}>
        <div><label style={lbl}>PRODUCT NAME *</label><input style={inp} value={f.name} onChange={e=>u("name",e.target.value)} placeholder="Phantom Black Tee"/></div>
        <div>
          <label style={lbl}>CATEGORY *</label>
          <select style={inp} value={f.category} onChange={e=>{if(e.target.value==="__new__"){setShowNew(true);}else{u("category",e.target.value);setShowNew(false);}}}>
            <option value="">বেছে নাও</option>
            {cats.map(c=><option key={c} value={c}>{c}</option>)}
            <option value="__new__">➕ নতুন category যোগ করো</option>
          </select>
          {showNew&&<div style={{marginTop:".5rem",display:"flex",gap:".4rem"}}>

/* ═══════════════════════════════════════════════
   ADMIN LOGIN
═══════════════════════════════════════════════ */
function AdminLogin({onSuccess,onBack}){
  const[pw,setPw]=useState("");const[show,setShow]=useState(false);const[err,setErr]=useState(false);
  const check=()=>{
    // Rate limiting — ৩ বারের বেশি ভুল দিলে ৩০ সেকেন্ড lock
    const attempts=LS.get("plexo_login_attempts",0);
    const lockUntil=LS.get("plexo_login_lock",0);
    if(Date.now()<lockUntil){
      const secs=Math.ceil((lockUntil-Date.now())/1000);
      setErr(`⏳ ${secs} সেকেন্ড অপেক্ষা করো`);return;
    }
    const stored=LS.get("plexo_admin_pw","");
    // প্রথমবার — কোনো password set নেই, যেকোনো ৬+ char accept করো
    const isValid = stored ? pw===stored : pw.length>=6;
    if(isValid){
      if(!stored) LS.set("plexo_admin_pw",pw); // প্রথম login-এ password set করো
      LS.set("plexo_admin_session",Date.now()); // timestamp দিয়ে session
      LS.set("plexo_login_attempts",0);
      onSuccess();
    } else {
      const newAttempts=attempts+1;
      LS.set("plexo_login_attempts",newAttempts);
      if(newAttempts>=3) LS.set("plexo_login_lock",Date.now()+30000);
      setErr(`❌ Wrong password! (${newAttempts}/3)`);
      setPw("");
    }
  };
  return<div style={{minHeight:"100vh",background:C.bg,display:"flex",alignItems:"center",justifyContent:"center",padding:"1rem"}}>
    <div style={{background:"#0D0D10",border:`1px solid ${C.bd}`,borderRadius:"6px",width:"100%",maxWidth:360,padding:"2rem"}}>
      <div style={{marginBottom:"1.75rem"}}><Logo/></div>
      <SLabel style={{marginBottom:"1.25rem"}}>🔐 LOGIN TO CONTINUE</SLabel>
      <div style={{marginBottom:"1rem"}}>
        <label style={LBL}>PASSWORD</label>
        <div style={{position:"relative"}}>
          <input type={show?"text":"password"} value={pw} autoFocus onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&check()} placeholder="••••••••" style={{...INP,letterSpacing:show?".05em":".2em",border:`1px solid ${err?C.warm:C.bd}`}}/>
          <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:".75rem",top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.sub,fontSize:"1rem",padding:0}}>{show?"🙈":"👁️"}</button>
        </div>
        {err&&<p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",color:C.warm,marginTop:".5rem"}}>{err}</p>}
      </div>
      <button onClick={check} style={{width:"100%",background:C.ac,color:"#080809",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".75rem",padding:".85rem",border:"none",cursor:"pointer",letterSpacing:".15em",borderRadius:"2px"}}>LOGIN →</button>
      <button onClick={onBack} style={{width:"100%",marginTop:".75rem",background:"none",border:"none",cursor:"pointer",color:C.sub,fontFamily:"'Space Mono',monospace",fontSize:".6rem",letterSpacing:".12em",padding:".5rem"}}>← BACK TO STORE</button>
      <p style={{fontFamily:"'Space Mono',monospace",fontSize:".5rem",color:C.mt,textAlign:"center",marginTop:".75rem"}}>
        {LS.get("plexo_admin_pw","")?"":"প্রথমবার: যেকোনো password দাও — সেটাই হয়ে যাবে!"}
      </p>
    </div>
  </div>;
}

/* --- Categories tab --- */
function CategoriesTab({showToast}){
  const[cats,setCats]=useState(()=>getCats());

  const saveCats=arr=>{setCats(arr);LS.set("plexo_cats",arr);};
  const add=()=>{const t=newCat.trim();if(!t)return;if(cats.map(c=>c.toLowerCase()).includes(t.toLowerCase())){alert("Already exists!");return;}saveCats([...cats,t]);setNewCat("");showToast("✅ Category added!");};
  const del=cat=>{if(!window.confirm(`"${cat}" delete করবে?`))return;saveCats(cats.filter(c=>c!==cat));showToast("🗑 Deleted!");};
  const move=(i,dir)=>{const arr=[...cats];[arr[i],arr[i+dir]]=[arr[i+dir],arr[i]];saveCats(arr);};
  const reset=()=>{if(!window.confirm("Default categories-এ ফিরে যাবে?"))return;saveCats(DEF_CATS);showToast("✅ Reset done!");};

    <SLabel style={{marginBottom:".4rem"}}>MANAGE</SLabel>

function Admin({products,onSaveProducts,settings,onSaveSettings,onBack}){
  const[authed,setAuthed]=useState(()=>{
    const session=LS.get("plexo_admin_session",0);
    // Session ২৪ ঘন্টা valid
    return session && (Date.now()-session)<24*60*60*1000;
  });
  if(!authed)return<AdminLogin onSuccess={()=>setAuthed(true)} onBack={onBack}/>;
  return<AdminDashboard products={products} onSaveProducts={onSaveProducts} settings={settings} onSaveSettings={onSaveSettings} onBack={onBack}/>;
}

      setTapTimer(t);

  const TH={
    bg:    darkMode?"#080809":"#F5F5F0",
    surface:darkMode?"#101014":"#FFFFFF",
    border: darkMode?"#1C1C22":"#E0E0D8",

    sub:    darkMode?"#80808A":"#555550",

  const saveSettings=s=>{setSettings({...settings,...s});LS.set("plexo_settings",{...settings,...s});};
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2800);};

  const addToCart=(product,size,qty)=>{
    const cid=product.id+"_"+size;
    const name=`${product.name} (${size})`;
    setCart(c=>{const ex=c.find(i=>i.cid===cid);if(ex)return c.map(i=>i.cid===cid?{...i,qty:i.qty+qty}:i);return[...c,{cid,name,price:product.price,qty}];});
    showToast("✅ ADDED TO CART!");
  };
  const addDirect=product=>{
    const cid=product.id+"_M";const name=`${product.name} (M)`;
    setCart(c=>{const ex=c.find(i=>i.cid===cid);if(ex)return c.map(i=>i.cid===cid?{...i,qty:i.qty+1}:i);return[...c,{cid,name,price:product.price,qty:1}];});
    showToast("✅ ADDED!");setDrawerTab("cart");setDrawerOpen(true);
  };
  const cartQty=cart.reduce((s,i)=>s+i.qty,0);
  const ac=settings.accentColor||C.ac;

  // filtered products
  const visibleProducts=activeCat?products.filter(p=>p.category===activeCat):products;

  if(admin)return<Admin products={products} onSaveProducts={saveProds} settings={settings} onSaveSettings={saveSettings} onBack={()=>setAdmin(false)}/>;

        :<div className="prod-grid" style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:"1rem"}}>
          {products.map(p=><ProductCard key={p.id} product={p} settings={settings} onOpen={setDetail} onQuickAdd={addDirect}/>)}

        <div>
          <p style={{fontFamily:"'Space Mono',monospace",fontSize:".58rem",letterSpacing:".18em",color:ac,marginBottom:"1rem"}}>CONTACT</p>
          {settings.waNumber&&<a href={`https://wa.me/${settings.waNumber}`} target="_blank" style={{display:"flex",alignItems:"center",gap:".5rem",background:"#25D366",color:"#fff",fontFamily:"'Space Mono',monospace",fontWeight:700,fontSize:".65rem",padding:".65rem 1rem",borderRadius:"2px",textDecoration:"none",letterSpacing:".08em",width:"fit-content"}}>💬 WHATSAPP ORDER</a>}
        </div>
      </div>
      <div style={{borderTop:`1px solid ${TH.border}`,paddingTop:"1.5rem",display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:"1rem"}}>
        <p style={{fontFamily:"'Space Mono',monospace",fontSize:".55rem",color:TH.muted}}>© 2025 {settings.brandName.toUpperCase()}. {settings.footerText}</p>
        <button onClick={toggleTheme} style={{background:"transparent",color:TH.muted,fontFamily:"'Space Mono',monospace",fontSize:".55rem",padding:".4rem .75rem",border:`1px solid ${TH.border}`,cursor:"pointer",borderRadius:"2px",letterSpacing:".08em"}}>
          {darkMode?"☀️ LIGHT MODE":"🌙 DARK MODE"}
        </button>
      </div>
    </footer>

    </>}{/* end !activeCat */}

    {/* Modals */}
    <ProductModal product={detail} settings={settings} onClose={()=>setDetail(null)} onAdd={addToCart}/>
    <CartDrawer cart={cart} open={drawerOpen} tab={drawerTab} onTab={setDrawerTab} onClose={()=>setDrawerOpen(false)} onRemove={id=>setCart(c=>c.filter(i=>i.cid!==id))} onClear={()=>setCart([])} onCheckout={()=>{setDrawerOpen(false);setOrderOpen(true);}} settings={settings}/>
    <OrderDrawer cart={cart} open={orderOpen} onClose={()=>setOrderOpen(false)} onSuccess={order=>{setCart([]);setConfirmed(order);}} settings={settings}/>
    {confirmed&&<OrderConfirm order={confirmed} settings={settings} onClose={()=>setConfirmed(null)} onViewOrders={()=>{setConfirmed(null);setDrawerTab("orders");setDrawerOpen(true);}}/>}
    <Toast msg={toast}/>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
